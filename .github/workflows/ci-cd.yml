name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  DOCKER_BUILDKIT: 1

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install --workspace=server
          npm install --workspace=client --legacy-peer-deps

      - name: Run server tests
        run: npm run test --workspace=server
        env:
          DATABASE_URL: postgresql://test:test@localhost/test
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

      - name: Build client
        run: npm run build --workspace=client
        env:
          VITE_API_URL: http://localhost:5000
          VITE_GA_MEASUREMENT_ID: G-TESTONLY

      - name: Build server
        run: npm run build --workspace=server

  build-docker:
    name: Build Docker image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile
          push: false
          tags: sura-codex/server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./client/Dockerfile
          push: false
          tags: sura-codex/client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} -p ${{ secrets.DEPLOY_PORT || 22 }} "
            cd ${{ secrets.DEPLOY_PATH }} && \\
            docker compose -f docker-compose.prod.yml pull && \\
            docker compose -f docker-compose.prod.yml build --no-cache && \\
            docker compose -f docker-compose.prod.yml up -d && \\
            docker system prune -f
          "

      - name: Health check
        run: |
          sleep 10
          curl -f https://${{ secrets.DOMAIN }}/health || exit 1

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment completed: ${{ job.status }}"
